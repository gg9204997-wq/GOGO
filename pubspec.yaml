name: joojo_chat
description: "Joojo Chat - Professional Voice Chat Platform"

publish_to: "none"

version: 1.0.0+1

environment:
  sdk: ">=3.12.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # ===========================
  # State Management
  # ===========================
  flutter_riverpod: ^2.6.1

  # ===========================
  # Navigation
  # ===========================
  go_router: ^16.3.0

  # ===========================
  # Backend
  # ===========================
  supabase_flutter: ^2.10.3

  # ===========================
  # Networking
  # ===========================
  dio: ^5.9.0
  connectivity_plus: ^7.0.0

  # ===========================
  # Voice Chat
  # ===========================
  agora_rtc_engine: ^6.5.2
  permission_handler: ^12.0.1

  # ===========================
  # Storage
  # ===========================
  shared_preferences: ^2.5.3
  flutter_secure_storage: ^9.2.4

  # ===========================
  # Media
  # ===========================
  cached_network_image: ^3.4.1
  flutter_cache_manager: ^3.4.1
  image_picker: ^1.2.0
  flutter_svg: ^2.2.0

  # ===========================
  # UI
  # ===========================
  google_fonts: ^6.3.1
  carousel_slider: ^5.1.1
  smooth_page_indicator: ^1.2.1
  shimmer: ^3.0.0
  flutter_animate: ^4.5.2
  lottie: ^3.3.2
  iconsax_flutter: ^1.0.1

  # ===========================
  # Utils
  # ===========================
  intl: ^0.20.2
  uuid: ^4.5.1
  equatable: ^2.0.7
  collection: ^1.19.1
  logger: ^2.6.1

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

  build_runner: ^2.5.4

  flutter_launcher_icons: ^0.14.4
  flutter_native_splash: ^2.4.6

flutter:

  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
    - assets/svg/
    - assets/lottie/
    - assets/animations/
    - assets/audio/
    - assets/fonts/
    - assets/avatars/
    - assets/banners/
    - assets/badges/
    - assets/frames/
    - assets/vehicles/
    - assets/gifts/
    - assets/countries/
    - assets/backgrounds/

  fonts:
    - family: Cairo
      fonts:
        - asset: assets/fonts/Cairo-Regular.ttf
        - asset: assets/fonts/Cairo-Medium.ttf
          weight: 500
        - asset: assets/fonts/Cairo-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Cairo-Bold.ttf
          weight: 700

flutter_launcher_icons:
  android: true
  ios: true
  image_path: assets/icons/app_icon.png
  adaptive_icon_background: "#0D1117"
  adaptive_icon_foreground: assets/icons/app_icon_foreground.png
  remove_alpha_ios: true

flutter_native_splash:
  color: "#0D1117"
  image: assets/images/splash_logo.png
  android: true
  ios: true
  web: false